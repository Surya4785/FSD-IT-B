<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Here</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #070702;
            font-family: Arial, sans-serif;
        }
        .register-box {
            background: #12aacf;
            padding: 32px 40px;
            border-radius: 10px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 350px;
        }
        h1 {
            margin-bottom: 20px;
            color: white;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }
        label {
            margin-bottom: 4px;
            font-weight: bold;
        }
        input, select, textarea {
            margin-bottom: 16px;
            width: 100%;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        textarea {
            resize: vertical;
        }
        .gender-box {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .gender-box label {
            margin: 0;
            font-weight: normal;
        }
        .buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        input[type="submit"], input[type="reset"] {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }
        input[type="submit"] { background-color: green; }
        input[type="reset"] { background-color: red; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>Register Here</h1>
        <form action="register.jsp">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>

            <label for="mobile">Mobile Number:</label>
            <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" placeholder="Enter 10-digit number">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="dates">Date of Birth:</label>
            <input type="date" id="dates" name="dates" required>

            <label>Gender:</label>
            <div class="gender-box">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other" required>
                <label for="other">Other</label>
            </div>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="3" placeholder="Enter your current address"></textarea>

            <label for="branch">Branch:</label> 
            <select id="branch" name="branch">
                <option value="CSE">CSE</option>
                <option value="IT">IT</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
                <option value="MECH">MECH</option>
                <option value="CIVIL">CIVIL</option>
            </select>

            <label for="sem">Semester:</label>
            <select id="sem" name="sem" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
            </select>

            <label for="upload">Upload 12th Marksheet:</label>
            <input type="file" id="upload" name="upload" required>

            <div class="buttons">
                <input type="submit" value="Register">
                <input type="reset" value="Reset">
            </div>
        </form>
    </div>
</body>
</html>
